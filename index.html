<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torrefações de Cafés Especiais · Brasil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f3ee;
    --card: #ffffff;
    --text: #1a1510;
    --muted: #6b5f52;
    --accent: #8b4513;
    --accent-light: #f0e6dc;
    --green: #2d5a27;
    --green-light: #e8f0e7;
    --border: rgba(139, 69, 19, 0.15);
    --shadow: 0 2px 16px rgba(26, 21, 16, 0.06);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--text);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
  }

  .header-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(247, 243, 238, 0.45);
    margin-bottom: 0.75rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 600;
    color: #f7f3ee;
    line-height: 1.15;
    margin-bottom: 0.75rem;
  }

  header h1 span {
    color: #c8956a;
  }

  .header-sub {
    font-size: 0.875rem;
    color: rgba(247, 243, 238, 0.5);
    font-weight: 300;
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* FILTERS */
  .filters-wrap {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: var(--shadow);
  }

  .filters {
    max-width: 900px;
    margin: 0 auto;
    padding: 1rem 1.5rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .filters input, .filters select {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.9rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    flex: 1;
    min-width: 140px;
  }

  .filters input:focus, .filters select:focus {
    border-color: var(--accent);
  }

  .filters input::placeholder { color: var(--muted); }

  .results-count {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 400;
    white-space: nowrap;
    padding: 0 0.25rem;
  }

  /* MAIN */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.4rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    animation: fadeUp 0.35s ease both;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(26, 21, 16, 0.1);
    border-color: rgba(139, 69, 19, 0.3);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .card-location {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 400;
  }

  .card-badges {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: 0.15rem;
  }

  .badge {
    font-size: 0.7rem;
    font-weight: 500;
    padding: 0.25rem 0.6rem;
    border-radius: 99px;
    letter-spacing: 0.01em;
  }

  .badge-loja {
    background: var(--green-light);
    color: var(--green);
  }

  .badge-online {
    background: var(--accent-light);
    color: var(--accent);
  }

  .card-ig {
    margin-top: 0.25rem;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .card-ig:hover { opacity: 0.7; }

  .card-ig svg {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
  }

  .card-address {
    font-size: 0.75rem;
    color: var(--muted);
    line-height: 1.55;
    padding-top: 0.6rem;
    margin-top: 0.1rem;
    border-top: 1px solid var(--border);
  }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.9rem;
    grid-column: 1 / -1;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Curadoria colaborativa · Brasil</div>
  <h1>Torrefações de<br><span>Cafés Especiais</span></h1>
  <p class="header-sub">Todas as torrefações listadas enviam para todo o Brasil</p>
</header>

<div class="filters-wrap">
  <div class="filters">
    <input type="text" id="search" placeholder="Buscar por nome ou cidade…" autocomplete="off">
    <select id="uf"><option value="">Todos os estados</option></select>
    <select id="loja">
      <option value="">Loja física: todas</option>
      <option value="sim">Tem loja física</option>
      <option value="nao">Só online</option>
    </select>
    <span class="results-count" id="count"></span>
  </div>
</div>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>
  Lista mantida pela comunidade · <a href="https://github.com" id="gh-link">Ver no GitHub</a>
</footer>

<script>
const CSV_URL = 'torrefacoes.csv';

function parseCSV(text) {
  const lines = [];
  let cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === '\n' && !inQ) { lines.push(cur); cur = ''; }
    else { cur += c; }
  }
  if (cur) lines.push(cur);

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = [];
    let cell = '', q = false;
    for (let j = 0; j < line.length; j++) {
      const c = line[j];
      if (c === '"') { q = !q; }
      else if (c === ',' && !q) { cols.push(cell.trim()); cell = ''; }
      else { cell += c; }
    }
    cols.push(cell.trim());
    if (cols[0]) rows.push({
      nome: cols[0] || '',
      ig: (cols[1] || '').trim(),
      cidade: cols[2] || '',
      uf: cols[3] || '',
      endereco: (cols[4] || '').replace(/\s*\|\s*/g, '\n').trim()
    });
  }
  return rows;
}

let all = [];

async function load() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    all = parseCSV(text);
    buildUFs();
    render();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="empty">Erro ao carregar dados. Verifique se o arquivo torrefacoes.csv está na mesma pasta.</div>';
  }
}

function buildUFs() {
  const sel = document.getElementById('uf');
  const ufs = [...new Set(all.map(r => r.uf))].sort();
  ufs.forEach(u => {
    const o = document.createElement('option');
    o.value = u; o.textContent = u;
    sel.appendChild(o);
  });
}

function igUrl(handle) {
  return 'https://instagram.com/' + handle.replace('@','');
}

const igIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>`;

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const uf = document.getElementById('uf').value;
  const loja = document.getElementById('loja').value;

  const filtered = all.filter(r => {
    const matchQ = r.nome.toLowerCase().includes(q) || r.cidade.toLowerCase().includes(q);
    const matchUF = !uf || r.uf === uf;
    const temLoja = r.endereco.length > 0;
    const matchLoja = !loja || (loja === 'sim' ? temLoja : !temLoja);
    return matchQ && matchUF && matchLoja;
  });

  const n = filtered.length;
  document.getElementById('count').textContent =
    n + ' torrefaç' + (n === 1 ? 'ão' : 'ões');

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">Nenhum resultado para essa busca.</div>';
    return;
  }

  grid.innerHTML = filtered.map((r, i) => {
    const temLoja = r.endereco.length > 0;
    const badge = temLoja
      ? '<span class="badge badge-loja">loja física</span>'
      : '<span class="badge badge-online">só online</span>';
    const igLink = r.ig
      ? `<a class="card-ig" href="${igUrl(r.ig)}" target="_blank" rel="noopener">${igIcon}${r.ig}</a>`
      : '';
    const addrLines = r.endereco ? r.endereco.split('\n').filter(Boolean) : [];
    const addr = addrLines.length
      ? `<div class="card-address">${addrLines.join('<br>')}</div>`
      : '';
    return `<div class="card" style="animation-delay:${Math.min(i,12)*0.03}s">
      <div class="card-name">${r.nome}</div>
      <div class="card-location">${r.cidade} · ${r.uf}</div>
      <div class="card-badges">${badge}</div>
      ${igLink}
      ${addr}
    </div>`;
  }).join('');
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('uf').addEventListener('change', render);
document.getElementById('loja').addEventListener('change', render);

load();
</script>
</body>
</html>
