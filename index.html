<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torrefações de Cafés Especiais · Brasil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f2ed;
  --card: #ffffff;
  --text: #1c1813;
  --muted: #6b5f52;
  --accent: #7a3b10;
  --accent-light: #f0e6dc;
  --green: #2d5a27;
  --green-light: #e8f0e7;
  --border: rgba(122, 59, 16, 0.13);
  --shadow: 0 1px 12px rgba(28, 24, 19, 0.05);
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header { background: #1c1813; padding: 3rem 2rem 2.5rem; text-align: center; }
.header-eyebrow { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(245,242,237,0.4); margin-bottom: 0.8rem; }
header h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 5vw, 3rem); color: #f5f2ed; line-height: 1.15; margin-bottom: 0.6rem; }
header h1 span { color: #c8956a; }
.header-sub { font-size: 0.85rem; color: rgba(245,242,237,0.45); font-weight: 300; max-width: 400px; margin: 0 auto; line-height: 1.6; }

.filters-wrap { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow); }
.filters { max-width: 900px; margin: 0 auto; padding: 0.9rem 1.5rem; display: flex; gap: 0.65rem; flex-wrap: wrap; align-items: center; }
.filters input, .filters select {
  font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 0.5rem 0.85rem; background: var(--bg); color: var(--text);
  outline: none; transition: border-color 0.2s; flex: 1; min-width: 130px;
}
.filters input:focus, .filters select:focus { border-color: var(--accent); }
.filters input::placeholder { color: var(--muted); }
.results-count { font-size: 0.78rem; color: var(--muted); white-space: nowrap; padding: 0 0.2rem; }

main { max-width: 900px; margin: 0 auto; padding: 1.75rem 1.5rem 4rem; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 1rem; }

.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 1.2rem 1.35rem; display: flex; flex-direction: column; gap: 0.45rem;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  animation: fadeUp 0.3s ease both;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(28,24,19,0.09); border-color: rgba(122,59,16,0.28); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.card-name { font-size: 0.95rem; font-weight: 500; color: var(--text); line-height: 1.3; }
.card-name a { color: inherit; text-decoration: none; }
.card-name a:hover { color: var(--accent); }
.card-location { font-size: 0.78rem; color: var(--muted); }

.card-badges { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-top: 0.1rem; }
.badge { font-size: 0.68rem; font-weight: 500; padding: 0.22rem 0.55rem; border-radius: 99px; }
.badge-loja { background: var(--green-light); color: var(--green); }
.badge-online { background: var(--accent-light); color: var(--accent); }

.card-links { display: flex; gap: 0.75rem; align-items: center; margin-top: 0.2rem; flex-wrap: wrap; }
.card-ig, .card-site {
  display: inline-flex; align-items: center; gap: 0.3rem;
  font-size: 0.78rem; font-weight: 500; text-decoration: none;
  transition: opacity 0.15s;
}
.card-ig { color: var(--accent); }
.card-site { color: var(--muted); }
.card-ig:hover, .card-site:hover { opacity: 0.65; }
.card-ig svg, .card-site svg { width: 12px; height: 12px; flex-shrink: 0; }

.card-address { font-size: 0.73rem; color: var(--muted); line-height: 1.55; padding-top: 0.55rem; margin-top: 0.1rem; border-top: 1px solid var(--border); }

.empty { text-align: center; padding: 4rem 2rem; color: var(--muted); font-size: 0.875rem; grid-column: 1 / -1; }

footer { text-align: center; padding: 2rem; font-size: 0.73rem; color: var(--muted); border-top: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Curadoria colaborativa · Brasil</div>
  <h1>Torrefações de<br><span>Cafés Especiais</span></h1>
  <p class="header-sub">Todas as torrefações listadas enviam para todo o Brasil</p>
</header>

<div class="filters-wrap">
  <div class="filters">
    <input type="text" id="search" placeholder="Buscar por nome ou cidade…" autocomplete="off">
    <select id="uf"><option value="">Todos os estados</option></select>
    <select id="loja">
      <option value="">Loja física: todas</option>
      <option value="sim">Tem loja física</option>
      <option value="nao">Só online</option>
    </select>
    <span class="results-count" id="count"></span>
  </div>
</div>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>Lista mantida pela comunidade</footer>

<script>
const CSV_URL = 'torrefacoes.csv';

function parseCSV(text) {
  const rows = [];
  // Normalize line endings
  const normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  
  function parseLine(line) {
    const cols = [];
    let i = 0;
    while (i < line.length) {
      if (line[i] === '"') {
        // Quoted field
        i++; // skip opening quote
        let cell = '';
        while (i < line.length) {
          if (line[i] === '"' && line[i+1] === '"') {
            cell += '"'; i += 2; // escaped quote
          } else if (line[i] === '"') {
            i++; break; // closing quote
          } else {
            cell += line[i++];
          }
        }
        cols.push(cell.trim());
        if (line[i] === ',') i++; // skip comma
      } else {
        // Unquoted field
        let cell = '';
        while (i < line.length && line[i] !== ',') cell += line[i++];
        cols.push(cell.trim());
        if (line[i] === ',') i++;
      }
    }
    return cols;
  }

  // Split into lines respecting quoted newlines
  const lines = [];
  let cur = '', inQ = false;
  for (let i = 0; i < normalized.length; i++) {
    const c = normalized[i];
    if (c === '"') { inQ = !inQ; cur += c; }
    else if (c === '\n' && !inQ) { lines.push(cur); cur = ''; }
    else { cur += c; }
  }
  if (cur.trim()) lines.push(cur);

  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = parseLine(line);
    if (!cols[0]) continue;
    rows.push({
      nome: cols[0] || '',
      ig: (cols[1] || '').trim(),
      site: (cols[2] || '').trim(),
      cidade: cols[3] || '',
      uf: cols[4] || '',
      endereco: (cols[5] || '').replace(/\s*\|\s*/g, '\n').trim()
    });
  }
  return rows;
}

let all = [];

async function load() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    all = parseCSV(text);
    buildUFs();
    render();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="empty">Erro ao carregar dados.</div>';
  }
}

function buildUFs() {
  const sel = document.getElementById('uf');
  const ufs = [...new Set(all.map(r => r.uf))].sort();
  ufs.forEach(u => {
    const o = document.createElement('option');
    o.value = u; o.textContent = u;
    sel.appendChild(o);
  });
}

const igIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>`;
const siteIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const uf = document.getElementById('uf').value;
  const loja = document.getElementById('loja').value;

  const filtered = all.filter(r => {
    const matchQ = r.nome.toLowerCase().includes(q) || r.cidade.toLowerCase().includes(q);
    const matchUF = !uf || r.uf === uf;
    const temLoja = r.endereco.length > 0;
    const matchLoja = !loja || (loja === 'sim' ? temLoja : !temLoja);
    return matchQ && matchUF && matchLoja;
  });

  const n = filtered.length;
  document.getElementById('count').textContent = n + ' torrefaç' + (n === 1 ? 'ão' : 'ões');

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">Nenhum resultado para essa busca.</div>';
    return;
  }

  grid.innerHTML = filtered.map((r, i) => {
    const temLoja = r.endereco.length > 0;
    const badge = temLoja
      ? '<span class="badge badge-loja">loja física</span>'
      : '<span class="badge badge-online">só online</span>';

    const igHandle = r.ig ? r.ig.replace('@','') : '';
    const igLink = igHandle
      ? `<a class="card-ig" href="https://instagram.com/${igHandle}" target="_blank" rel="noopener">${igIcon}${r.ig}</a>`
      : '';
    const siteLink = r.site
      ? `<a class="card-site" href="${r.site}" target="_blank" rel="noopener">${siteIcon}site</a>`
      : '';

    const addrLines = r.endereco ? r.endereco.split('\n').filter(Boolean) : [];
    const addr = addrLines.length
      ? `<div class="card-address">${addrLines.join('<br>')}</div>`
      : '';

    const nomeFmt = r.site
      ? `<a href="${r.site}" target="_blank" rel="noopener">${r.nome}</a>`
      : r.nome;

    return `<div class="card" style="animation-delay:${Math.min(i,12)*0.025}s">
      <div class="card-name">${nomeFmt}</div>
      <div class="card-location">${r.cidade} · ${r.uf}</div>
      <div class="card-badges">${badge}</div>
      <div class="card-links">${igLink}${siteLink}</div>
      ${addr}
    </div>`;
  }).join('');
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('uf').addEventListener('change', render);
document.getElementById('loja').addEventListener('change', render);
load();
</script>
</body>
</html>
